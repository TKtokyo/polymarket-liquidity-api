name = "polymarket-liquidity-api"
main = "src/index.ts"
compatibility_date = "2025-02-25"
compatibility_flags = ["nodejs_compat"]

# Default environment: Base Sepolia (testnet)
[vars]
FACILITATOR_URL = "https://www.x402.org/facilitator"
X402_NETWORK = "eip155:84532"

# KV namespace for market liquidity cache (local dev uses simulated KV)
[[kv_namespaces]]
binding = "MARKET_CACHE"
id = "placeholder-create-with-wrangler-kv-namespace-create"

# --- Production environment: Base mainnet ---
[env.production]
name = "polymarket-liquidity-api"

[env.production.vars]
FACILITATOR_URL = "https://api.cdp.coinbase.com/platform/v2/x402"
X402_NETWORK = "eip155:8453"

[[env.production.kv_namespaces]]
binding = "MARKET_CACHE"
id = "placeholder-create-with-wrangler-kv-namespace-create"

# Secrets (set via `wrangler secret put`):
# PAY_TO_ADDRESS = "0x..."
#
# Production-only (set via `wrangler secret put --env production`):
# CDP_API_KEY_ID = "..."
# CDP_API_KEY_SECRET = "..."
